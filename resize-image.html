<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resize Images Online | Pixel-Perfect | Image Tools Studio</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body data-theme="dark">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">Image Tools Studio</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="compress-image.html">Compress</a>
                <a href="resize-image.html">Resize</a>
                <button id="themeToggle" style="background:none; border:none; cursor:pointer;">☀️</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 120px;">
        <div class="ad-box ad-h">Advertisement</div>
        
        <div style="text-align: center; margin-bottom: 64px;">
            <h1>Resize Image</h1>
            <p>Scale your images with mathematical precision.</p>
        </div>

        <div id="uploadArea" class="upload-wrapper" style="max-width: 600px;">
            <div class="upload-area">
                <div style="font-size: 48px; margin-bottom: 20px;">📐</div>
                <h3>Select image to resize</h3>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>
        </div>

        <div id="workspace" style="display: none;">
            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 40px;">
                <div class="glass-card" style="padding: 24px; border-radius: 20px; text-align: center;">
                    <img id="previewImg" style="max-width: 100%; max-height: 500px; border-radius: 12px; background: #000;">
                </div>

                <div class="glass-card" style="padding: 32px; border-radius: 20px; height: fit-content;">
                    <h3>Dimensions</h3>
                    <div style="margin-top: 32px; display: flex; flex-direction: column; gap: 20px;">
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-size: 14px;">Width (px)</label>
                            <input type="number" id="widthInp" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main);">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 8px; font-size: 14px;">Height (px)</label>
                            <input type="number" id="heightInp" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-main); color: var(--text-main);">
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" id="lockAspect" checked style="width: 18px; height: 18px; accent-color: var(--primary);">
                            <label for="lockAspect" style="font-size: 14px; cursor: pointer;">Lock Aspect Ratio</label>
                        </div>
                    </div>
                    <button id="downloadBtn" class="btn btn-primary" style="width: 100%; margin-top: 40px; padding: 16px;">Resize & Download</button>
                    <button onclick="location.reload()" class="btn btn-secondary" style="width: 100%; margin-top: 12px;">Reset</button>
                </div>
            </div>
        </div>

        <div class="ad-box ad-f" style="margin-top: 80px;">Advertisement</div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/resize.js"></script>
</body>
</html>
