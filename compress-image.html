<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress Images Online | Zero Uploads | Image Tools Studio</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body data-theme="dark">
    <nav>
        <div class="container nav-content">
            <a href="index.html" class="logo">Image Tools Studio</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="compress-image.html">Compress</a>
                <a href="resize-image.html">Resize</a>
                <button id="themeToggle" style="background:none; border:none; cursor:pointer;">☀️</button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 120px;">
        <div class="ad-box ad-h">Advertisement</div>
        
        <div style="text-align: center; margin-bottom: 64px;">
            <h1>Compress Image</h1>
            <p>High-performance compression without quality loss.</p>
        </div>

        <div id="uploadArea" class="upload-wrapper" style="max-width: 600px;">
            <div class="upload-area">
                <div style="font-size: 48px; margin-bottom: 20px;">📁</div>
                <h3>Click or drop image to compress</h3>
                <input type="file" id="fileInput" hidden accept="image/*">
            </div>
        </div>

        <div id="workspace" style="display: none;">
            <div style="display: grid; grid-template-columns: 1fr 350px; gap: 40px;">
                <div class="glass-card" style="padding: 24px; border-radius: 20px;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <p style="font-size: 12px; margin-bottom: 10px;">Original</p>
                            <img id="originalPreview" style="width: 100%; border-radius: 12px; background: #000;">
                            <p id="origSizeLabel" style="margin-top: 10px; font-weight: 600;"></p>
                        </div>
                        <div>
                            <p style="font-size: 12px; margin-bottom: 10px;">Optimized</p>
                            <img id="optimizedPreview" style="width: 100%; border-radius: 12px; background: #000;">
                            <p id="optSizeLabel" style="margin-top: 10px; font-weight: 600; color: var(--accent);"></p>
                        </div>
                    </div>
                    <div id="savingsLabel" style="margin-top: 24px; text-align: center; font-size: 24px; font-weight: 700; color: var(--primary);"></div>
                </div>

                <div class="glass-card" style="padding: 32px; border-radius: 20px; height: fit-content;">
                    <h3>Settings</h3>
                    <div style="margin-top: 32px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                            <label>Quality</label>
                            <span id="qualityVal">80%</span>
                        </div>
                        <input type="range" id="quality" min="1" max="100" value="80" style="width: 100%; accent-color: var(--primary);">
                    </div>
                    <button id="downloadBtn" class="btn btn-primary" style="width: 100%; margin-top: 40px; padding: 16px;">Download Optimized Image</button>
                    <button onclick="location.reload()" class="btn btn-secondary" style="width: 100%; margin-top: 12px;">Reset</button>
                </div>
            </div>
        </div>

        <div class="ad-box ad-f" style="margin-top: 80px;">Advertisement</div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/compress.js"></script>
</body>
</html>
