<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor - Image Tools Studio</title>
<meta name="description" content="Compress JPG, PNG and WEBP images online for free.">

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:#fff;
    margin:0;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}
h1{
    text-align:center;
}
.upload{
    border:2px dashed #3b82f6;
    padding:40px;
    text-align:center;
    border-radius:12px;
    margin:20px 0;
}
input[type=file]{
    margin-top:10px;
}
.preview{
    width:100%;
    max-height:400px;
    object-fit:contain;
    margin-top:20px;
    display:none;
}
button{
    background:#3b82f6;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}
.info{
    margin-top:15px;
}
.range{
    width:100%;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h1>Image Compressor</h1>

<div class="upload">
    <p>Select an Image</p>
    <input type="file" id="fileInput" accept="image/*">
</div>

<label>Compression Quality</label>
<input type="range" min="10" max="100" value="70" id="quality" class="range">

<div class="info">
    <p id="originalSize">Original Size: -</p>
    <p id="compressedSize">Compressed Size: -</p>
</div>

<button id="compressBtn">Compress Image</button>

<img id="preview" class="preview">

<br>
<a id="downloadLink" style="display:none;">
    <button>Download Compressed Image</button>
</a>

</div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const preview = document.getElementById('preview');
const compressBtn = document.getElementById('compressBtn');
const downloadLink = document.getElementById('downloadLink');

let selectedFile = null;

fileInput.addEventListener('change', e=>{
    selectedFile = e.target.files[0];

    if(!selectedFile) return;

    document.getElementById('originalSize').innerText =
        "Original Size: " +
        (selectedFile.size/1024).toFixed(2) + " KB";

    const reader = new FileReader();

    reader.onload = function(event){
        preview.src = event.target.result;
        preview.style.display = 'block';
    }

    reader.readAsDataURL(selectedFile);
});

compressBtn.addEventListener('click', ()=>{

    if(!selectedFile){
        alert("Please select an image.");
        return;
    }

    const quality =
        document.getElementById('quality').value / 100;

    const img = new Image();

    img.onload = function(){

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img,0,0);

        canvas.toBlob(blob=>{

            document.getElementById('compressedSize').innerText =
            "Compressed Size: " +
            (blob.size/1024).toFixed(2) + " KB";

            const url = URL.createObjectURL(blob);

            downloadLink.href = url;
            downloadLink.download = "compressed-image.jpg";
            downloadLink.style.display = 'inline';

        },'image/jpeg',quality);

    }

    img.src = preview.src;

});
</script>

</body>
</html>
